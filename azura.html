<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Azura AI Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #ffffff;
    --sidebar: #fafafa;
    --text: #050505;
    --muted: #8b8f98;
    --border: #eeeeee;
    --soft: #f7f7f7;
    --black: #000000;
    --user: #f2f2f2;
    --bot: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
}

.app {
    width: 100%;
    height: 100vh;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 318px;
    height: 100vh;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 24px 34px;
    flex-shrink: 0;
}

.brand {
    display: flex;
    align-items: center;
    gap: 14px;
}

.logo-mark {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 4px solid var(--black);
    border-top-color: transparent;
    animation: spin 4s linear infinite;
}

.brand h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.04em;
}

.history {
    margin-top: 70px;
}

.history-title {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.16em;
    font-weight: 800;
    margin-bottom: 24px;
}

.history-item {
    padding: 12px 2px;
    color: #444;
    font-size: 0.98rem;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.2s;
}

.history-item:hover {
    color: #000;
    transform: translateX(4px);
}

.profile {
    border-top: 1px solid var(--border);
    padding-top: 14px;
    display: flex;
    align-items: center;
    gap: 13px;
}

.avatar {
    width: 40px;
    height: 40px;
    background: var(--black);
    color: #fff;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 0.82rem;
    font-weight: 700;
}

.profile strong {
    font-size: 0.98rem;
}

/* MAIN */
.main {
    flex: 1;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    background: #fff;
}

.topbar {
    display: none;
    height: 64px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
}

.menu-btn {
    border: none;
    background: #f3f3f3;
    color: #000;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
}

.chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 60px 8% 150px;
}

.welcome {
    min-height: calc(100vh - 210px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.center-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 70px;
}

.big-mark {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 8px solid var(--black);
    border-top-color: transparent;
    animation: spin 4s linear infinite;
}

.center-logo h2 {
    font-size: clamp(3rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.06em;
}

.messages {
    width: min(880px, 100%);
    margin: 0 auto;
    display: none;
}

.message {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    animation: fadeUp 0.35s ease;
}

.message-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 0.82rem;
    font-weight: 800;
}

.user-icon {
    background: #000;
    color: #fff;
}

.bot-icon {
    background: #f0f0f0;
    color: #000;
}

.message-content {
    max-width: 760px;
    padding: 14px 16px;
    border-radius: 8px;
    line-height: 1.7;
    font-size: 1rem;
}

.user-message .message-content {
    background: var(--user);
}

.bot-message .message-content {
    background: var(--bot);
    border: 1px solid var(--border);
}

/* INPUT */
.input-wrap {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 26px 8% 36px;
    background: linear-gradient(to top, #fff 72%, rgba(255,255,255,0));
}

.chat-form {
    width: min(1000px, 100%);
    margin: 0 auto;
    height: 75px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    box-shadow: 0 16px 45px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    padding: 0 10px 0 32px;
}

.chat-form input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: #111;
    font-size: 1.32rem;
    font-family: 'Inter', sans-serif;
    min-width: 0;
}

.chat-form input::placeholder {
    color: #73777f;
}

.send-btn {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: none;
    background: #000;
    color: #fff;
    cursor: pointer;
    font-size: 1.35rem;
    display: grid;
    place-items: center;
    transition: 0.25s;
    flex-shrink: 0;
}

.send-btn:hover {
    transform: scale(1.04);
    background: #222;
}

.footer-note {
    text-align: center;
    margin-top: 34px;
    color: #a0a3a9;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
}

/* MOBILE SIDEBAR */
.overlay {
    display: none;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(12px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 800px) {
    body {
        overflow: hidden;
    }

    .sidebar {
        position: fixed;
        left: -320px;
        top: 0;
        z-index: 30;
        transition: 0.3s ease;
    }

    .sidebar.active {
        left: 0;
    }

    .overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.35);
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
        z-index: 20;
    }

    .overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    .topbar {
        display: flex;
    }

    .chat-area {
        padding: 36px 5% 135px;
    }

    .welcome {
        min-height: calc(100vh - 220px);
    }

    .center-logo {
        gap: 12px;
        margin-bottom: 45px;
    }

    .big-mark {
        width: 48px;
        height: 48px;
        border-width: 6px;
    }

    .center-logo h2 {
        font-size: 3.2rem;
    }

    .input-wrap {
        padding: 20px 5% 24px;
    }

    .chat-form {
        height: 64px;
        padding-left: 20px;
    }

    .chat-form input {
        font-size: 1rem;
    }

    .send-btn {
        width: 48px;
        height: 48px;
        font-size: 1.1rem;
    }
}

@media (max-width: 420px) {
    .center-logo h2 {
        font-size: 2.7rem;
    }

    .brand h1 {
        font-size: 1.7rem;
    }

    .sidebar {
        width: 285px;
        left: -290px;
    }
}
</style>
</head>

<body>

<div class="app">

    <aside class="sidebar" id="sidebar">
        <div>
            <div class="brand">
                <div class="logo-mark"></div>
                <h1>AZURA</h1>
            </div>

            <div class="history">
                <div class="history-title">HISTORY</div>
                <div class="history-item">XCL ENT Bags Project</div>
                <div class="history-item">Neural Logic Debug</div>
                <div class="history-item">Website Ideas</div>
                <div class="history-item">AI Store Assistant</div>
            </div>
        </div>

        <div class="profile">
            <div class="avatar">AG</div>
            <strong>Azam Guru</strong>
        </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">

        <div class="topbar">
            <button class="menu-btn" id="menuBtn" aria-label="Open menu">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="brand">
                <div class="logo-mark"></div>
                <h1>AZURA</h1>
            </div>
        </div>

        <section class="chat-area" id="chatArea">

            <div class="welcome" id="welcome">
                <div class="center-logo">
                    <div class="big-mark"></div>
                    <h2>Azura</h2>
                </div>
            </div>

            <div class="messages" id="messages"></div>

        </section>

        <div class="input-wrap">
            <form class="chat-form" id="chatForm">
                <input
                    type="text"
                    id="userInput"
                    placeholder="How can I help you today?"
                    autocomplete="off"
                    required
                >

                <button class="send-btn" type="submit" aria-label="Send message">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </form>

            <div class="footer-note">AZAM GURU YT // 2026</div>
        </div>

    </main>

</div>

<script>
const chatForm = document.getElementById("chatForm");
const userInput = document.getElementById("userInput");
const messages = document.getElementById("messages");
const welcome = document.getElementById("welcome");
const chatArea = document.getElementById("chatArea");

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

menuBtn.addEventListener("click", () => {
    sidebar.classList.add("active");
    overlay.classList.add("active");
});

overlay.addEventListener("click", () => {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
});

chatForm.addEventListener("submit", function(event) {
    event.preventDefault();

    const text = userInput.value.trim();

    if (!text) {
        return;
    }

    welcome.style.display = "none";
    messages.style.display = "block";

    addMessage("user", text);
    userInput.value = "";

    setTimeout(() => {
        const reply = getBotReply(text);
        addMessage("bot", reply);
    }, 700);
});

function addMessage(type, text) {
    const message = document.createElement("div");
    message.className = `message ${type}-message`;

    const icon = document.createElement("div");
    icon.className = `message-icon ${type}-icon`;
    icon.textContent = type === "user" ? "AG" : "AI";

    const content = document.createElement("div");
    content.className = "message-content";
    content.textContent = text;

    message.appendChild(icon);
    message.appendChild(content);
    messages.appendChild(message);

    chatArea.scrollTop = chatArea.scrollHeight;
}

function getBotReply(input) {
    const message = input.toLowerCase().trim();
    const mathExpression = extractMathExpression(message);

    if (mathExpression) {
        const result = solveMath(mathExpression);

        if (result !== null) {
            return `${mathExpression} = ${result}`;
        }

        return "I found a math question, but I could not solve it. Please check the expression.";
    }

    if (message.includes("hello") || message.includes("hi")) {
        return "Hello Azam. I am Azura, your AI assistant. How can I help you today?";
    }

    if (message.includes("website")) {
        return "I can help you plan, write, and improve website code. Tell me what kind of website you want to build.";
    }

    if (message.includes("ai")) {
        return "AI projects can be powerful when they solve a real problem. Share your idea and I will help you shape it.";
    }

    if (message.includes("code")) {
        return "Send me your code or describe what you want to build. I can help with HTML, CSS, JavaScript, backend logic, and debugging.";
    }

    return "I understand. I can currently answer simple messages and mathematical questions like 2+2-2, 10*5, or (20/4)+3.";
}

function extractMathExpression(text) {
    let expression = text
        .replace(/what is/g, "")
        .replace(/solve/g, "")
        .replace(/calculate/g, "")
        .replace(/multiplied by/g, "*")
        .replace(/divided by/g, "/")
        .replace(/plus/g, "+")
        .replace(/minus/g, "-")
        .replace(/times/g, "*")
        .replace(/multiply/g, "*")
        .replace(/divide/g, "/")
        .replace(/x/g, "*")
        .replace(/÷/g, "/")
        .replace(/×/g, "*")
        .replace(/=/g, "")
        .trim();

    const allowed = /^[0-9+\-*/().\s]+$/;
    const hasOperator = /[+\-*/]/.test(expression);
    const hasNumber = /[0-9]/.test(expression);

    if (allowed.test(expression) && hasOperator && hasNumber) {
        return expression.replace(/\s+/g, "");
    }

    return null;
}

function solveMath(expression) {
    try {
        if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
            return null;
        }

        const result = Function(`"use strict"; return (${expression})`)();

        if (!Number.isFinite(result)) {
            return null;
        }

        return Number.isInteger(result) ? result : Number(result.toFixed(6));
    } catch (error) {
        return null;
    }
}
</script>

</body>
</html>
